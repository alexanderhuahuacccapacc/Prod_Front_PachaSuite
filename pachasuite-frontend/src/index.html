<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pacha Suite — Hotel Puno</title>
  <base href="/">
  <link rel="icon" type="image/x-icon" href="PACHASUITE.ico">
  <!-- dns-prefetch: solo resuelve DNS, sin abrir TLS. Para orígenes que se usan
       DESPUÉS del primer render (llamadas a la API una vez Angular ya arrancó) -->
  <link rel="dns-prefetch" href="https://prod-back-pachasuite.onrender.com">
  <link rel="dns-prefetch" href="https://czfxbrtdiiackpacflfm.supabase.co">

  <!-- preconnect: máximo 4, solo para orígenes usados de inmediato en el primer render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <!-- Google Fonts: Playfair Display + Inter en una sola hoja (reemplaza el @import del SCSS) -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap">

  <!-- Bootstrap 5.3.2: cargado sin bloquear el render -->
  <link rel="preload" as="style"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
        onload="this.onload=null;this.rel='stylesheet'">

  <!-- FontAwesome 6.5.1: cargado sin bloquear el render -->
  <link rel="preload" as="style"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous"
        onload="this.onload=null;this.rel='stylesheet'">

  <!-- Fallback por si JS tarda/falla: aplica las hojas igual -->
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </noscript>
</head>
<body>
<app-root></app-root>
</body>
</html>
